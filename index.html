/* ═══ FRAGMENTS ═══ */
function addFragment(d){
const col=d.collected||[];const frags=d.fragments||{};
const missing=BK.filter(k=>!col.includes(k));
if(missing.length===0)return d;
const target=missing[Math.floor(Math.random()*missing.length)];
if(!frags[target])frags[target]=0;
frags[target]=Math.min(3,frags[target]+1);
d.fragments=frags;
if(frags[target]>=3){d.collected=[...new Set([...(d.collected||[]),target])];notify(`${A[target].emoji} ${A[target].name} aura unlocked!`,"You collected 3 fragments")}
return d}

function rQuiz(){const q=S.qs[S.cq];const dots=S.qs.map((_,i)=>`<span style="display:inline-block;width:${i===S.cq?"24px":"8px"};height:8px;border-radius:${i===S.cq?"4px":"50%"};background:${i<S.cq?"#a855f7":i===S.cq?"#fff":"rgba(255,255,255,.15)"};transition:all .3s"></span>`).join("");
document.getElementById("app").innerHTML=`<div style="animation:fadeIn .35s ease-out"><div class="row between mb-32"><button onclick="S.screen='home';S.tab='home';render()" style="background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-family:'Sora',sans-serif;font-size:14px">← back</button><div style="display:flex;gap:8px">${dots}</div><span class="mono" style="font-size:12px;color:rgba(255,255,255,.3)">${S.cq+1}/5</span></div><h2 style="font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:32px;line-height:1.3">${q.q}</h2><div class="gap-12">${q.o.map((o,i)=>`<button class="btn" onclick="ans('${o.a}')" style="animation:slideUp .4s ease-out ${i*.06}s both"><span class="mono" style="opacity:.3;margin-right:12px;font-size:12px">${String.fromCharCode(65+i)}</span>${o.t}</button>`).join("")}</div></div>`}

function ans(a){
S.ans.push(a);if(S.cq<S.qs.length-1){S.cq++;render();return}
const ct={};S.ans.forEach(x=>ct[x]=(ct[x]||0)+1);
const w=Object.entries(ct).sort((a,b)=>b[1]-a[1])[0][0];S.res=A[w];
const d=gd(),t=td(),y=new Date(Date.now()-864e5).toISOString().split("T")[0];
let ns=1;if(d.lastDate===y)ns=(d.streak||0)+1;else if(d.lastDate===t)ns=d.streak||1;
const nc=[...new Set([...(d.collected||[]),w])];
if(BK.every(k=>nc.includes(k))&&!nc.includes("oracle"))nc.push("oracle");
const nt=(d.tp||0)+S.res.pts;
// Night check badge
const hour=new Date().getHours();if(hour>=0&&hour<5)d.nightCheck=true;
// Add fragment
addFragment(d);
Object.assign(d,{streak:ns,lastDate:t,collected:nc,lastAura:w,tp:nt});
// Leaderboard
if(!d.lb)d.lb=[];const e=d.lb.find(x=>x.n===S.user.name);
if(e){e.tp=nt;e.la=w;e.ck=(e.ck||0)+1;e.st=ns;e.av=S.user.avatar}
else d.lb.push({n:S.user.name,av:S.user.avatar,tp:nt,la:w,ck:1,st:ns});
d.lb.sort((a,b)=>b.tp-a.tp);
sd(d);checkBadges();
// Effects
if(S.res.rar==="Mythic"||S.res.rar==="✦ Transcendent ✦"){confetti(35);setTimeout(screenShake,200)}
else if(S.res.rar==="Legendary"||S.res.rar==="Ultra Rare"){confetti(20)}
S.screen="result";S.tab="home";render()}
